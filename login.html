
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login / Signup</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- ICONS -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
 <link href="./img/logo1.png" rel="icon">
<style>

/* BACKGROUND */
body {
  background: linear-gradient(135deg, #eef2ff, #f8fafc);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* CARD */
.auth-card {
  width: 100%;
  max-width: 420px;
  background: #fff;
  border-radius: 20px;
  padding: 30px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.1);
}

/* LOGO WRAPPER */
.logo {
  margin-bottom: 20px;
}

/* IMAGE */
.logo-img {
  max-width: 140px;   /* 👈 control size */
  height: auto;
  object-fit: contain;
  display: block;
  margin: auto;
}

/* TABLET */
@media(max-width:768px){
  .logo-img {
    max-width: 120px;
  }
}

/* MOBILE */
@media(max-width:360px){
  .logo-img {
    max-width: 100px;
  }
}

/* TABS */
.nav-tabs {
  border: none;
  justify-content: center;
  margin-bottom: 20px;
}

.nav-tabs .nav-link {
  border: none;
  color: #666;
  font-weight: 500;
}

.nav-tabs .nav-link.active {
  color: #7563ff;
;
  border-bottom: 2px solid #7563ff;
;
}

/* INPUT */
.form-control {
  border-radius: 12px;
  padding: 12px;
}

/* PASSWORD TOGGLE */
.password-box {
  position: relative;
}

.password-box i {
  position: absolute;
  right: 15px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: #666;
}

/* BUTTON */
.btn-main {
  background: #7563ff;
;
  color: #fff;
  border-radius: 30px;
  padding: 12px;
  border: none;
}

.btn-main:hover {
  background: #2563eb;
}

/* DIVIDER */
.divider {
  text-align: center;
  margin: 20px 0;
  position: relative;
}

.divider::before,
.divider::after {
  content: "";
  position: absolute;
  width: 40%;
  height: 1px;
  background: #ddd;
  top: 50%;
}

.divider::before { left: 0; }
.divider::after { right: 0; }

/* SOCIAL BUTTONS */
.social-login {
  display: flex;
  gap: 10px;
}

.social-login button {
  flex: 1;
  border-radius: 12px;
  border: 1px solid #ddd;
  padding: 10px;
  background: #fff;
  transition: 0.3s;
}

.social-login button:hover {
  background: #f1f5f9;
}

/* RESPONSIVE */
@media(max-width:360px){
  .auth-card {
    padding: 20px;
  }
}

</style>
</head>

<body>

<div class="auth-card">

  <!-- LOGO -->
<div class="logo text-center">
  <a href="index.html" class="navbar-brand d-inline-flex align-items-center justify-content-center">
    <img src="./img/logo1.png" alt="Tiny Tales Logo" class="logo-img">
  </a>
</div>

  <!-- TABS -->
  <ul class="nav nav-tabs" id="authTab">
    <li class="nav-item">
      <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#login">Login</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" data-bs-toggle="tab" data-bs-target="#signup">Sign Up</button>
    </li>
  </ul>

  <div class="tab-content">

    <!-- LOGIN -->
    <div class="tab-pane fade show active" id="login">

      <input type="email" class="form-control mb-3" placeholder="Email">

      <div class="password-box mb-3">
        <input type="password" class="form-control" id="loginPass" placeholder="Password">
        <i class="fa fa-eye" onclick="togglePass('loginPass', this)"></i>
      </div>

      <button class="btn btn-main w-100">Login</button>

    </div>

    <!-- SIGNUP -->
    <div class="tab-pane fade" id="signup">

      <input type="text" class="form-control mb-3" placeholder="Full Name">
      <input type="email" class="form-control mb-3" placeholder="Email">

      <div class="password-box mb-3">
        <input type="password" class="form-control" id="signupPass" placeholder="Password">
        <i class="fa fa-eye" onclick="togglePass('signupPass', this)"></i>
      </div>

      <button class="btn btn-main w-100">Create Account</button>

    </div>

  </div>

  <!-- DIVIDER -->
  <div class="divider">OR</div>

  <!-- SOCIAL LOGIN -->
  <div class="social-login">
    <button><i class="fab fa-google"></i></button>
    <button><i class="fab fa-apple"></i></button>
    <button><i class="fab fa-linkedin"></i></button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
function togglePass(id, icon) {
  const input = document.getElementById(id);
  if (input.type === "password") {
    input.type = "text";
    icon.classList.remove("fa-eye");
    icon.classList.add("fa-eye-slash");
  } else {
    input.type = "password";
    icon.classList.remove("fa-eye-slash");
    icon.classList.add("fa-eye");
  }
}
</script>

</body>
</html>
